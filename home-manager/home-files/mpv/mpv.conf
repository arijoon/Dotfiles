# Use the libplacebo-based output. `vo=gpu-next` is the modern renderer and
# fixes the flickering seen with the legacy `gpu` vo + interpolation on Linux.
vo=gpu-next

# `gpu-hq` is deprecated; `high-quality` is its modern replacement and pairs
# with gpu-next.
profile=high-quality
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
save-position-on-quit=yes
resume-playback=yes
keep-open=yes
osd-status-msg=${playback-time/full} / ${duration} (${percent-pos}%)\nframe: ${estimated-frame-number} / ${estimated-frame-count}

# interpolation settings
interpolation=yes
video-sync=display-resample
tscale=oversample
