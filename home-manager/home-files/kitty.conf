# Kitty config — mirrors the tmux / zellij flow on this machine.
# Docs: https://sw.kovidgoyal.net/kitty/conf/
#
# xmonad uses mod1Mask (Alt) globally, so any Alt-bound shortcut is
# unreachable inside kitty. kitty's defaults already lean on Ctrl+Shift
# (kitty_mod), which sidesteps the collision out of the box.

# --- Font ---
font_family      Ubuntu Mono
font_size        11.0

# --- Window ---
remember_window_size   yes
initial_window_width   180c
initial_window_height  50c
window_padding_width   2
confirm_os_window_close 0

# --- Cursor ---
cursor_shape          block
cursor_blink_interval 0

# --- Scrollback ---
scrollback_lines 100000
# Open scrollback in nvim so 'y' yanks like in tmux copy-mode.
# kitty-scrollback-pager strips ANSI escapes (CSI + OSC) first so the
# nvim buffer is clean text — see scripts/kitty-scrollback-pager.
scrollback_pager kitty-scrollback-pager

# --- Mouse / clipboard ---
copy_on_select        no
strip_trailing_spaces smart

# --- Bell ---
enable_audio_bell no

# --- Tab bar ---
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# Tab colors — match Tomorrow Night. Default kitty tab colors are
# bright/white-ish on dark which makes inactive tabs hard to read.
tab_bar_background      #1d1f21
active_tab_foreground   #1d1f21
active_tab_background   #81a2be
inactive_tab_foreground #c5c8c6
inactive_tab_background #2a2c2e

# --- Layouts ---
# 'splits' enables tmux-style vsplit/hsplit. 'stack' is the
# zoom/full-screen mode (similar to tmux <prefix> z).
enabled_layouts splits,stack,tall,grid

# --- Theme: alacritty defaults (Tomorrow Night) ---
foreground           #c5c8c6
background           #1d1f21
selection_foreground #1d1f21
selection_background #c5c8c6

# Normal
color0  #1d1f21
color1  #cc6666
color2  #b5bd68
color3  #f0c674
color4  #81a2be
color5  #b294bb
color6  #8abeb7
color7  #c5c8c6

# Bright
color8  #666666
color9  #d54e53
color10 #b9ca4a
color11 #e7c547
color12 #7aa6da
color13 #c397d8
color14 #70c0b1
color15 #eaeaea

# --- Split borders (kitty doesn't support alpha here, so we pick
#     colors close to the background to fade the divider line) ---
window_border_width   1pt
draw_minimal_borders  yes
active_border_color   #3a3d40
inactive_border_color #2a2c2e

# --- Session persistence ---
# Allow `kitty @` remote control so save-kitty-session can dump layouts.
allow_remote_control yes
listen_on            unix:/tmp/kitty-%i
# Uncomment after running save-kitty-session at least once:
startup_session    ~/.config/kitty/session.conf

# ============================================================
# Keybindings
# ============================================================
# kitty_mod = ctrl+shift (the default) — kept since xmonad owns Alt.

# --- Splits (similar to tmux <prefix> | / -) ---
# `--add-to-session=session:.` makes new splits join the currently
# active session so save_as_session picks them up. No-op when no
# session is active.
map kitty_mod+backslash launch --location=vsplit --cwd=current --add-to-session=session:.
map kitty_mod+minus     launch --location=hsplit --cwd=current --add-to-session=session:.
map kitty_mod+enter     launch --cwd=current --add-to-session=session:.

# --- Pane (window) focus — vim hjkl ---
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+l neighboring_window right

# --- Pane swap / move ---
map kitty_mod+left  move_window left
map kitty_mod+down  move_window down
map kitty_mod+up    move_window up
map kitty_mod+right move_window right

# --- Zoom / stack toggle ---
map kitty_mod+z toggle_layout stack

# --- Resize (modal: enter, then hjkl / arrows; Esc to exit) ---
map kitty_mod+r start_resizing_window

# --- Tabs ---
map kitty_mod+t      new_tab_with_cwd
map kitty_mod+q      close_tab
map kitty_mod+n      next_tab
map kitty_mod+p      previous_tab
map kitty_mod+1      goto_tab 1
map kitty_mod+2      goto_tab 2
map kitty_mod+3      goto_tab 3
map kitty_mod+4      goto_tab 4
map kitty_mod+5      goto_tab 5
map kitty_mod+6      goto_tab 6
map kitty_mod+7      goto_tab 7
map kitty_mod+8      goto_tab 8
map kitty_mod+9      goto_tab 9

# --- Rename ---
map kitty_mod+comma  set_tab_title
map kitty_mod+period set_window_title

# --- Clipboard ---
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# --- Copy mode ---
# kitty has no modal copy-mode like tmux, but two ergonomic keyboard paths:
#   1. show_scrollback    — opens entire scrollback in nvim; 'y' to yank.
#   2. hints              — pick a region (line/word/path/url/hash) and copy.
map kitty_mod+u show_scrollback
map kitty_mod+space>l kitten hints --type=line --program=@ --multiple
map kitty_mod+space>w kitten hints --type=word --program=@
map kitty_mod+space>f kitten hints --type=path --program=@
map kitty_mod+space>o kitten hints --type=url   --program=@
map kitty_mod+space>g kitten hints --type=hash  --program=@

# --- Session persistence ---
# Ctrl+Shift+s : silently overwrite the default session file.
# F5           : prompt for a path — for saving named/custom sessions.
# Both capture the entire current kitty state (no --match filter, no
# --use-foreground-process so only shells are restored).
map kitty_mod+s save_as_session --save-only ~/.config/kitty/session.conf
map f5          save_as_session
